# Nginx reverse proxy для LibreChat за Tailscale
# Заменить TAILSCALE_HOSTNAME на реальный hostname из `tailscale status`
# Пример: librechat.tail1234.ts.net

upstream librechat {
    server 127.0.0.1:3080;
    keepalive 32;
}

server {
    listen 80;
    server_name TAILSCALE_HOSTNAME;
    # Redirect to HTTPS если используется сертификат (опционально)
    # return 301 https://$host$request_uri;
    # Либо проксировать напрямую по HTTP внутри Tailscale:

    client_max_body_size 64M;

    # WebSocket support (требуется LibreChat)
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Таймауты для длинных streaming ответов
    proxy_read_timeout 300s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 300s;

    location / {
        proxy_pass http://librechat;
    }
}

