version: "3.8"

services:
  librechat:
    image: ghcr.io/danny-avila/librechat:latest
    container_name: librechat
    restart: unless-stopped
    ports:
      - "127.0.0.1:3080:3080"
    depends_on:
      mongodb:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    volumes:
      - ./librechat.yaml:/app/librechat.yaml:ro
      - ./mcp:/mcp:ro
      - librechat_images:/app/client/public/images
      - librechat_logs:/app/api/logs
      # logseq-content vault — read-write для filesystem MCP
      - /home/claude/logseq-content:/vault:rw
      # beancount файл
      - /home/claude/finance/main.beancount:/data/main.beancount:ro
    environment:
      - HOST=0.0.0.0
      - PORT=3080
      - MONGO_URI=mongodb://mongodb:27017/LibreChat
      - MEILI_HOST=http://meilisearch:7700
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ALLOW_EMAIL_LOGIN=true
      - ALLOW_REGISTRATION=${ALLOW_REGISTRATION:-false}
      - SESSION_EXPIRY=${SESSION_EXPIRY:-1000 * 60 * 15}
      - REFRESH_TOKEN_EXPIRY=${REFRESH_TOKEN_EXPIRY:-1000 * 60 * 60 * 24 * 7}
    env_file:
      - .env

  mongodb:
    image: mongo:7
    container_name: librechat-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    command: mongod --noauth

  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: librechat-meilisearch
    restart: unless-stopped
    volumes:
      - meilisearch_data:/meili_data
    environment:
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
      - MEILI_NO_ANALYTICS=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mongodb_data:
  meilisearch_data:
  librechat_images:
  librechat_logs:
